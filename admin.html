<!DOCTYPE html>
<html>
<head>
  <title>All Students Data</title>
  <style>
    body { font-family: Arial; background:#f0f2f5; padding:20px; }
    .container { max-width:900px; margin:auto; background:white; padding:20px; border-radius:10px; }
    h2 { text-align:center; color:#1a73e8; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { border:1px solid #ddd; padding:12px; text-align:left; }
    th { background:#1a73e8; color:white; }
    tr:nth-child(even) { background:#f9f9f9; }
    .topbar { display:flex; justify-content:space-between; align-items:center; }
    button { background:#db4437; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h2>All Students Data</h2>
      <button onclick="logout()">Logout</button>
    </div>
    <p id="userEmail"></p>
    <div id="content">
      <p style="text-align:center;">Loading data...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA2hb5SCjcaPO9AOnXCVQfSyX9Stpa0YkE",
      authDomain: "student-login-page-b90a8.firebaseapp.com",
      projectId: "student-login-page-b90a8",
      storageBucket: "student-login-page-b90a8.appspot.com",
      messagingSenderId: "47707857642",
      appId: "1:47707857642:web:23ce4444b54e77f97f3d03"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // Login ayina evaraina chudochu - admin check ledu
        document.getElementById('userEmail').innerText = `Logged in as: ${user.email}`;
        loadAllStudents();
      } else {
        window.location.href = "index.html"; // Login avvakapothe login page ki pampu
      }
    });

    // Firestore nunchi anni students data teesukuni table lo chupinchu
    async function loadAllStudents() {
      const querySnapshot = await getDocs(collection(db, "students"));
      let tableHTML = `
        <table>
          <tr>
            <th>S.No</th>
            <th>Name</th>
            <th>Roll Number</th>
            <th>Branch</th>
            <th>Email</th>
          </tr>
      `;
      
      let count = 1;
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        tableHTML += `
          <tr>
            <td>${count}</td>
            <td>${data.name || '-'}</td>
            <td>${data.rollNo || '-'}</td>
            <td>${data.branch || '-'}</td>
            <td>${data.email || '-'}</td>
          </tr>
        `;
        count++;
      });
      
      tableHTML += `</table>`;
      
      if (count === 1) {
        tableHTML = `<p style="text-align:center;">Inka evaru details save cheyyaledhu. Dashboard lo velli save cheyyandi.</p>`;
      }
      
      document.getElementById('content').innerHTML = tableHTML;
    }

    window.logout = function() {
      signOut(auth);
    }
  </script>
</body>
</html>
