<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: 'Segoe UI', sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px;
    }
    .card {
      background: white; padding: 40px 30px; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%; max-width: 350px; text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 10px; color: #333; }
    p { color: #666; margin-bottom: 20px; }
    .stats {
      font-weight: bold; margin-bottom: 30px; color: #333;
      font-size: 16px;
    }
    button {
      width: 100%; padding: 15px; margin: 8px 0; border: none;
      border-radius: 10px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: 0.3s;
    }
    .logout {
      background: #667eea; color: white;
    }
    .logout:hover { background: #5a67d8; }
    .playground {
      background: #4c51bf; color: white;
    }
    .playground:hover { background: #434190; }
    
    /* Playground ni hide cheyyi first */
    #editorPage { display: none; }
    .show { display: block !important; }
    .hide { display: none !important; }
  </style>
</head>
<body>
  <!-- DASHBOARD PAGE -->
  <div class="card" id="dashboardPage">
    <h1>Hi Vyshnavi 👋</h1>
    <p>Dashboard ki welcome</p>
    <div class="stats">Courses: 5 | Attendance: 85%</div>
    <button class="logout" onclick="logout()">Logout</button>
    <button class="playground" onclick="openEditor()">Open Playground 💻</button>
  </div>

  <!-- EDITOR PAGE - Nenu mundu ichina code idhi -->
  <div id="editorPage">
    <!-- Ikkada manam mundu chesina Editor code vastadi -->
    <iframe src="editor.html" style="width:100vw; height:100vh; border:none;"></iframe>
  </div>

  <script>
    // Login check
    if (localStorage.getItem('loggedIn') !== 'true') {
      window.location.href = 'index.html';
    }

    function logout() {
      localStorage.removeItem('loggedIn');
      window.location.href = 'index.html';
    }

    function openEditor() {
      window.location.href = 'editor.html'; // Editor file peru
    }
  </script>
</body>
</html>
