<!DOCTYPE html>
<html>
<head>
  <title>Vyshnavi Dashboard</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      margin: 0;
    }
    .dashboard { 
      max-width: 600px; 
      margin: 0 auto; 
      background: white; 
      padding: 30px; 
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { color: #764ba2; margin-bottom: 5px; }
    .roll { color: #666; margin-bottom: 25px; }
    .card { 
      background: #f8f9ff; 
      padding: 15px; 
      margin: 15px 0; 
      border-radius: 10px;
      border-left: 4px solid #667eea;
    }
    .card h3 { margin: 0 0 10px 0; color: #333; }
    .logout { 
      background: #ff4757; 
      color: white; 
      padding: 12px 30px; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }
    .logout:hover { background: #e84118; }
  </style>
</head>
<body>
  <div class="dashboard">
    <h1>Welcome, Vyshnavi 👋</h1>
    <p class="roll">Roll No: 244637s | BSc Computers - 1st Year</p>
    
    <div class="card">
      <h3>📚 Your Subjects & Marks</h3>
      <p>Mathematics: 85/100</p>
      <p>Computer Science: 92/100</p>
      <p>English: 78/100</p>
    </div>
    
    <div class="card">
      <h3>📅 Attendance</h3>
      <p>Present: 92% | Total Classes: 50</p>
    </div>
    
    <div class="card">
      <h3>📝 Pending Assignments</h3>
      <p>1. HTML Project - Due: 10th Oct</p>
      <p>2. Maths Assignment - Due: 12th Oct</p>
    </div>
    
    <button class="logout" onclick="window.location.href='index.html'">Logout</button>
  </div>
</body>
      </html>
