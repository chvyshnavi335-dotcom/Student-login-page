<!DOCTYPE html>
<html>
<head>
    <title>VS Code Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #1e1e1e; color: white; font-family: monospace; }
        .header { background: #333; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        #editor { width: 100%; height: 60vh; background: #1e1e1e; color: #d4d4d4; border: none; padding: 10px; font-size: 16px; }
        #output { width: 100%; height: 25vh; background: #000; color: #0f0; padding: 10px; overflow-y: auto; }
        button { padding: 8px 15px; border: none; cursor: pointer; }
        .run-btn { background: #0e7a0d; color: white; }
        .logout-btn { background: #d32f2f; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <span id="userEmail">Welcome: </span>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
    
    <select id="language">
        <option value="javascript">JavaScript</option>
    </select>
    <button class="run-btn" id="runBtn">▶ RUN CODE</button>
    
    <textarea id="editor">console.log("Hello Vyshnavi!");</textarea>
    <div id="output">👉 Welcome Vyshnavi! Code type chesi RUN kottu</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCD0w8dWq3o5eSFNLEJZtD2XJJ1dC2Cm_E",
            authDomain: "student-login-page-38c0b.firebaseapp.com",
            projectId: "student-login-page-38c0b",
            storageBucket: "student-login-page-38c0b.appspot.com",
            messagingSenderId: "529819232377",
            appId: "1:529819232377:web:46e48c235e1c0e81e90a2e"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // User lekapothe login page ki pampu
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmail').innerText = "Welcome: " + user.email;
            } else {
                window.location.href = "index.html";
            }
        });
        
        // Logout button
        document.getElementById('logoutBtn').onclick = () => {
            signOut(auth);
        };
        
        // RUN CODE button
        document.getElementById('runBtn').onclick = () => {
            const code = document.getElementById('editor').value;
            const output = document.getElementById('output');
            try {
                const logs = [];
                const originalLog = console.log;
                console.log = (...args) => logs.push(args.join(' '));
                eval(code);
                console.log = originalLog;
                output.innerText = logs.join('\n') || "Code run ayyindi, kani output em ledu";
            } catch (error) {
                output.innerText = "Error: " + error.message;
            }
        };
    </script>
</body>
</html>
