<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDMSMK - Attendance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f0f2f5; }
      .header { background: #1a4d8f; color: white; padding: 15px; text-align: center; position: relative; }
      .header h1 { font-size: 24px; }
      .header span { font-size: 14px; }
      .logout { position: absolute; right: 15px; top: 15px; background: #5b7fc4; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
      .tabs { display: flex; background: white; border-bottom: 2px solid #ddd; }
      .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border: none; background: white; }
      .tab.active { background: #e8f0fe; border-bottom: 3px solid #1a4d8f; font-weight: bold; }
      .container { padding: 15px; max-width: 600px; margin: 0 auto; }
      .date { text-align: center; color: #1a4d8f; margin: 10px 0; font-size: 16px; }
      .add-form { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
      .add-form input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
      .add-btn { width: 100%; background: #1a4d8f; color: white; padding: 12px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 5px; }
      .add-btn:hover { background: #153d70; }
      .search { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
      .stats { display: flex; justify-content: space-around; background: white; padding: 12px; border-radius: 8px; margin: 10px 0; }
      .stats div { font-weight: bold; }
      .student-card { background: white; padding: 12px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 4px solid #1a4d8f; }
      .student-info { flex: 1; }
      .roll-badge { background: #1a4d8f; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; display: inline-block; margin-bottom: 5px; }
      .student-name { font-size: 16px; font-weight: bold; margin: 3px 0; }
      .student-status { font-size: 13px; color: #666; }
      .parent-num { font-size: 12px; color: #888; }
      .actions { display: flex; gap: 8px; }
      .btn { width: 40px; height: 40px; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; }
      .btn-p { background: #28a745; color: white; }
      .btn-a { background: #dc3545; color: white; }
      .btn-x { background: #6c757d; color: white; }
      .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SDMSMK</h1>
        <span>302</span>
        <button class="logout">Logout</button>
    </div>

    <div class="tabs">
        <button class="tab active">Attendance</button>
        <button class="tab">Reports</button>
        <button class="tab">Settings</button>
    </div>

    <div class="container">
        <div class="date">Date: <span id="today"></span></div>

        <div class="add-form">
            <input type="text" id="rollNo" placeholder="Roll No">
            <input type="text" id="studentName" placeholder="Student Full Name">
            <input type="tel" id="parentNumber" placeholder="Parent WhatsApp: 919490475335">
            <button class="add-btn" onclick="addStudent()">+ Add Student</button>
        </div>

        <input type="text" class="search" id="searchBox" placeholder="🔍 Search Student..." onkeyup="searchStudent()">

        <div class="stats">
            <div>Present: <span id="presentCount">0</span></div>
            <div>Absent: <span id="absentCount">0</span></div>
            <div>Total: <span id="totalCount">0</span></div>
        </div>

        <div id="studentList"></div>
    </div>

    <script>
        let students = JSON.parse(localStorage.getItem('students')) || [];
        
        document.getElementById('today').textContent = new Date().toISOString().split('T')[0];
        
        function addStudent() {
            let roll = document.getElementById('rollNo').value.trim();
            let name = document.getElementById('studentName').value.trim();
            let parentNum = document.getElementById('parentNumber').value.trim();
            
            if(!roll ||!name ||!parentNum) {
                alert("Roll, Name, Parent Number anni fill chey");
                return;
            }
            
            // 91 tho start ayyi 12 digits undali: 919490475335
            if(parentNum.length!== 12 ||!parentNum.startsWith('91')) {
                alert("Parent number 91 tho start ayyi 12 digits undali\nEx: 919490475335\n+ vaddu, 0 vaddu");
                return;
            }
            
            if(students.find(s => s.roll === roll)) {
                alert("Ee Roll number already undi");
                return;
            }
            
            students.push({
                roll: roll, 
                name: name, 
                parent: parentNum,
                status: 'Present'
            });
            
            saveData();
            renderStudents();
            
            document.getElementById('rollNo').value = '';
            document.getElementById('studentName').value = '';
            document.getElementById('parentNumber').value = '';
        }
        
        function markPresent(roll) {
            let student = students.find(s => s.roll === roll);
            student.status = 'Present';
            saveData();
            renderStudents();
        }
        
        function markAbsent(roll) {
            let student = students.find(s => s.roll === roll);
            student.status = 'Absent';
            saveData();
            renderStudents();
            
            // WhatsApp message open chey
            let date = new Date().toLocaleDateString('en-IN');
            let message = `SDMSMK School: Mee pillalu ${student.name} (${student.roll}) ee roju ${date} na school ki raaledu. Gamaninchagalaru.`;
            
            // WhatsApp link - mobile lo WhatsApp app open avthundi
            let whatsappURL = `https://wa.me/${student.parent}?text=${encodeURIComponent(message)}`;
            window.open(whatsappURL, '_blank');
        }
        
        function deleteStudent(roll) {
            if(confirm('Ee student ni delete cheyala?')) {
                students = students.filter(s => s.roll!== roll);
                saveData();
                renderStudents();
            }
        }
        
        function renderStudents() {
            let list = document.getElementById('studentList');
            let search = document.getElementById('searchBox').value.toLowerCase();
            
            let filtered = students.filter(s => 
                s.name.toLowerCase().includes(search) || 
                s.roll.toLowerCase().includes(search)
            );
            
            list.innerHTML = filtered.map(s => `
                <div class="student-card">
                    <div class="student-info">
                        <div class="roll-badge">Roll ${s.roll}</div>
                        <div class="student-name">${s.name}</div>
                        <div class="student-status">${s.status}</div>
                        <div class="parent-num">📱 +${s.parent}</div>
                    </div>
                    <div class="actions">
                        <button class="btn btn-p" onclick="markPresent('${s.roll}')">P</button>
                        <button class="btn btn-a" onclick="markAbsent('${s.roll}')">A</button>
                        <button class="btn btn-x" onclick="deleteStudent('${s.roll}')">×</button>
                    </div>
                </div>
            `).join('');
            
            updateStats();
        }
        
        function updateStats() {
            let present = students.filter(s => s.status === 'Present').length;
            let absent = students.filter(s => s.status === 'Absent').length;
            document.getElementById('presentCount').textContent = present;
            document.getElementById('absentCount').textContent = absent;
            document.getElementById('totalCount').textContent = students.length;
        }
        
        function searchStudent() {
            renderStudents();
        }
        
        function saveData() {
            localStorage.setItem('students', JSON.stringify(students));
        }
        
        renderStudents();
    </script>
</body>
    </html>
