<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login + VS Black Editor</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .login-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-container h2 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group input {
      width: 100%;
      padding: 15px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      color: white;
      font-size: 16px;
      outline: none;
    }
    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }
    .login-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .login-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
    }
    .error-msg {
      color: #ff6b6b;
      text-align: center;
      margin-top: 15px;
      display: none;
    }
    
    /* Editor Styles */
    .editor-container {
      display: none;
      width: 100%;
      max-width: 1400px;
      height: 90vh;
      background: #1e1e1e;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.5s ease;
    }
    .editor-header {
      background: #2d2d30;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #3e3e42;
    }
    .editor-header h3 {
      color: #cccccc;
      font-size: 16px;
    }
    .logout-btn {
      padding: 8px 20px;
      background: #e74c3c;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    .logout-btn:hover {
      background: #c0392b;
    }
    .editor-body {
      display: flex;
      height: calc(100% - 60px);
    }
    .code-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #3e3e42;
    }
    .code-area textarea {
      flex: 1;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      padding: 20px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 15px;
      resize: none;
      outline: none;
    }
    .output-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #1e1e1e;
    }
    .output-header {
      background: #252526;
      padding: 10px 20px;
      color: #cccccc;
      border-bottom: 1px solid #3e3e42;
      font-size: 14px;
    }
    #output {
      flex: 1;
      padding: 20px;
      color: #00ff00;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .run-btn {
      padding: 12px 30px;
      background: #0e639c;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      margin: 10px;
      border-radius: 5px;
    }
    .run-btn:hover {
      background: #1177bb;
    }
    @media (max-width: 768px) {
      .editor-body {
        flex-direction: column;
      }
      .code-area {
        border-right: none;
        border-bottom: 1px solid #3e3e42;
      }
    }
  </style>
</head>
<body>
  <!-- Login Page -->
  <div class="login-container" id="loginPage">
    <h2><i class="fas fa-graduation-cap"></i> Student Login</h2>
    <div class="input-group">
      <input type="email" id="email" placeholder="Email: vyshnavi@gmail.com">
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder="Password: 123456">
    </div>
    <button class="login-btn" onclick="login()">Login</button>
    <div class="error-msg" id="errorMsg">Invalid email or password!</div>
  </div>

  <!-- VS Black Editor -->
  <div class="editor-container" id="editorPage">
    <div class="editor-header">
      <h3><i class="fas fa-code"></i> VS Black Editor - Welcome Vyshnavi 💚</h3>
      <div>
        <button onclick="logout()" class="logout-btn">Logout</button>
      </div>
    </div>

      <div class="code-area">
